<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clip Creator — The 33rd Team</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Settings Modal -->
  <div id="settings-modal" class="modal-overlay" style="display:none">
    <div class="modal">
      <h2>Settings</h2>
      <label for="api-key-input">Anthropic API Key</label>
      <input type="password" id="api-key-input" placeholder="sk-ant-..." autocomplete="off">
      <p class="hint">Stored locally in your browser. Never sent anywhere except Anthropic's API.</p>
      <div class="modal-actions">
        <button class="btn btn-secondary" onclick="closeSettings()">Cancel</button>
        <button class="btn btn-primary" onclick="saveSettings()">Save</button>
      </div>
    </div>
  </div>

  <!-- Sidebar -->
  <aside id="sidebar">
    <div class="sidebar-header">
      <h1>Clip<br>Creator</h1>
      <span class="subtitle">The 33rd Team</span>
    </div>
    <nav id="mode-list">
      <div class="mode-item active" data-mode="clips" onclick="selectMode('clips')">
        <span class="mode-icon">✂️</span>
        <span class="mode-name">Vertical Clips</span>
      </div>
      <div class="mode-item" data-mode="vod" onclick="selectMode('vod')">
        <span class="mode-icon">🎬</span>
        <span class="mode-name">VOD Suggestions</span>
      </div>
      <div class="mode-item" data-mode="thumbs" onclick="selectMode('thumbs')">
        <span class="mode-icon">🖼</span>
        <span class="mode-name">Thumbnails</span>
      </div>
    </nav>
    <div class="sidebar-footer">
      <button class="btn btn-ghost" onclick="openSettings()">⚙ Settings</button>
    </div>
  </aside>

  <!-- Main -->
  <main id="main">
    <header id="top-bar">
      <button id="menu-toggle" onclick="toggleSidebar()">☰</button>
      <h2 id="page-title">Vertical Clips</h2>
    </header>

    <!-- Input Form -->
    <section id="form-section">
      <div class="form-grid">
        <div class="field">
          <label for="show-select">Show</label>
          <select id="show-select">
            <option value="itb">In The Bayou</option>
            <option value="ctm">Check the Mic</option>
            <option value="nfl-spotlight">NFL Spotlight</option>
            <option value="stbrown">St. Brown Podcast</option>
            <option value="blocks">Blocks (Neal Brennan)</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div class="field">
          <label for="episode-input">Episode Title / #</label>
          <input type="text" id="episode-input" placeholder="e.g. Episode 15 - NOLA vs Baton Rouge">
        </div>
        <div class="field full">
          <label for="transcript-input">Transcript</label>
          <textarea id="transcript-input" rows="14" placeholder="Paste the full episode transcript here. Include timestamps if available (e.g. [00:05:32] or 5:32)."></textarea>
        </div>
        <div class="field full">
          <label for="context-input">Additional Context (optional)</label>
          <textarea id="context-input" rows="3" placeholder="e.g. Guest was trending on Twitter, specific topic went viral last week, target audience notes"></textarea>
        </div>
        <div class="field">
          <label for="clip-count">Max Clips to Find</label>
          <select id="clip-count">
            <option value="5">5 clips</option>
            <option value="8" selected>8 clips</option>
            <option value="10">10 clips</option>
            <option value="15">15 clips</option>
          </select>
        </div>
        <div class="field">
          <label for="clip-length">Target Clip Length</label>
          <select id="clip-length">
            <option value="30-60">30–60 sec (Shorts/Reels)</option>
            <option value="60-90" selected>60–90 sec (Sweet spot)</option>
            <option value="90-180">90–180 sec (Long-form vertical)</option>
          </select>
        </div>
      </div>
      <div class="form-actions">
        <button class="btn btn-primary btn-lg" id="generate-btn" onclick="generate()">Analyze Transcript</button>
      </div>
    </section>

    <!-- Loading -->
    <section id="loading-section" style="display:none">
      <div class="loader"></div>
      <p id="loading-text">Analyzing transcript...</p>
    </section>

    <!-- Clips Output -->
    <section id="clips-output" class="output-section" style="display:none">
      <div class="output-toolbar">
        <button class="btn btn-primary" onclick="exportPremiere()">📥 Export Premiere Markers (.csv)</button>
        <button class="btn btn-secondary" onclick="copyClips()">📋 Copy All Clips</button>
        <button class="btn btn-secondary" onclick="printOutput()">🖨 Print</button>
        <button class="btn btn-ghost" onclick="backToForm()">← Edit Inputs</button>
      </div>
      <div id="clips-content"></div>
    </section>

    <!-- VOD Output -->
    <section id="vod-output" class="output-section" style="display:none">
      <div class="output-toolbar">
        <button class="btn btn-secondary" onclick="copyVod()">📋 Copy All</button>
        <button class="btn btn-secondary" onclick="printOutput()">🖨 Print</button>
        <button class="btn btn-ghost" onclick="backToForm()">← Edit Inputs</button>
      </div>
      <div id="vod-content"></div>
    </section>

    <!-- Thumbs Output -->
    <section id="thumbs-output" class="output-section" style="display:none">
      <div class="output-toolbar">
        <button class="btn btn-secondary" onclick="copyThumbs()">📋 Copy All</button>
        <button class="btn btn-secondary" onclick="printOutput()">🖨 Print</button>
        <button class="btn btn-ghost" onclick="backToForm()">← Edit Inputs</button>
      </div>
      <div id="thumbs-content"></div>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Clip Creator</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0a0a0a;
      color: #e4e4e7;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-box {
      background: #141414;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 48px 40px;
      width: 360px;
      text-align: center;
    }
    .logo { font-size: 32px; font-weight: 800; letter-spacing: -1px; line-height: 1; margin-bottom: 4px; }
    .logo span { color: #c5a44e; }
    .subtitle { color: #8b8fa3; font-size: 12px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 36px; }
    label { display: block; text-align: left; font-size: 12px; color: #8b8fa3; margin-bottom: 6px; letter-spacing: 0.5px; }
    input[type="password"] {
      width: 100%;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 6px;
      color: #e4e4e7;
      padding: 12px 14px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus { border-color: #c5a44e; }
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 14px;
    }
    .btn:hover { opacity: 0.85; }
    .btn-primary { background: #c5a44e; color: #0a0a0a; }
    .btn-google {
      background: #fff;
      color: #222;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .divider { position: relative; margin: 20px 0; color: #444; font-size: 12px; }
    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: #2a2a2a;
    }
    .divider::before { left: 0; }
    .divider::after  { right: 0; }
    .error { color: #ef4444; font-size: 13px; margin-top: 10px; display: none; }
    .error.visible { display: block; }
  </style>
</head>
<body>
  <div class="login-box">
    <div class="logo">CLIP<br><span>CREATOR</span></div>
    <div class="subtitle">The 33rd Team</div>

    <% if (googleEnabled) { %>
    <a href="/auth/google">
      <button class="btn btn-google">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#34A853" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/><path fill="#FBBC05" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 0 0 7.18l2.67-2.07z"/><path fill="#EA4335" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3z"/></svg>
        Sign in with Google
      </button>
    </a>
    <div class="divider">or</div>
    <% } %>

    <form method="POST" action="/auth">
      <label>Access Code</label>
      <input type="password" name="password" placeholder="Enter access code…" autocomplete="current-password" required autofocus>
      <% if (error) { %><p class="error visible"><%= error %></p><% } %>
      <button type="submit" class="btn btn-primary">Unlock →</button>
    </form>
  </div>
</body>
</html>
